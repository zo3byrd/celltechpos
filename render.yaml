services:
  - type: web
    name: celltechpos
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node src/app.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: STORE_NAME
        value: CellTechPOS
      - key: ALLOWED_ORIGINS
        value: https://celltechpos.onrender.com,https://celltechpos.com,https://www.celltechpos.com,https://app.celltechpos.com
      - key: SQLITE_PATH
        value: /tmp/celltechpos.sqlite
