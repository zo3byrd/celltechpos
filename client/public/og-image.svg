<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060b18"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="60" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.035)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="300" cy="315" rx="350" ry="350" fill="#0d9488" opacity="0.07" filter="url(#glow)"/>
  <ellipse cx="900" cy="315" rx="300" ry="300" fill="#6366f1" opacity="0.06" filter="url(#glow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#teal)"/>

  <!-- Left UI mockup card -->
  <rect x="60" y="140" width="200" height="280" rx="16" fill="url(#card1)" stroke="rgba(45,212,191,0.15)" stroke-width="1.5"/>
  <!-- Card header -->
  <rect x="60" y="140" width="200" height="48" rx="16" fill="#1e293b"/>
  <rect x="60" y="168" width="200" height="20" fill="#1e293b"/>
  <rect x="78" y="156" width="60" height="8" rx="4" fill="rgba(45,212,191,0.5)"/>
  <rect x="78" y="170" width="40" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>
  <!-- Card rows -->
  <rect x="78" y="204" width="164" height="10" rx="5" fill="rgba(255,255,255,0.08)"/>
  <rect x="78" y="222" width="120" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>
  <rect x="78" y="238" width="140" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>
  <rect x="78" y="254" width="100" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>
  <!-- Divider -->
  <rect x="78" y="278" width="164" height="1" fill="rgba(255,255,255,0.06)"/>
  <!-- Total row -->
  <rect x="78" y="290" width="80" height="8" rx="4" fill="rgba(255,255,255,0.12)"/>
  <rect x="178" y="290" width="50" height="8" rx="4" fill="#0d9488" opacity="0.7"/>
  <!-- Green CTA button -->
  <rect x="78" y="356" width="164" height="38" rx="10" fill="#0d9488"/>
  <text x="160" y="381" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">CHARGE $54.09</text>

  <!-- Right UI mockup — repair ticket -->
  <rect x="940" y="140" width="200" height="280" rx="16" fill="url(#card1)" stroke="rgba(99,102,241,0.2)" stroke-width="1.5"/>
  <rect x="940" y="140" width="200" height="48" rx="16" fill="#1e293b"/>
  <rect x="940" y="168" width="200" height="20" fill="#1e293b"/>
  <rect x="958" y="154" width="70" height="8" rx="4" fill="rgba(139,92,246,0.6)"/>
  <rect x="958" y="168" width="45" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>
  <!-- Status badge -->
  <rect x="958" y="202" width="60" height="22" rx="11" fill="rgba(251,191,36,0.15)" stroke="rgba(251,191,36,0.3)" stroke-width="1"/>
  <text x="988" y="217" font-family="Arial" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle">IN PROGRESS</text>
  <!-- Repair rows -->
  <rect x="958" y="238" width="164" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="958" y="254" width="120" height="7" rx="3.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="958" y="268" width="140" height="7" rx="3.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="958" y="282" width="100" height="7" rx="3.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="958" y="298" width="164" height="1" fill="rgba(255,255,255,0.06)"/>
  <!-- Cost row -->
  <rect x="958" y="312" width="80" height="7" rx="3.5" fill="rgba(255,255,255,0.1)"/>
  <text x="1120" y="320" font-family="Arial" font-size="13" font-weight="800" fill="#4ade80" text-anchor="end">$89.99</text>
  <!-- Notify button -->
  <rect x="958" y="356" width="164" height="38" rx="10" fill="rgba(99,102,241,0.8)"/>
  <text x="1040" y="381" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">NOTIFY CUSTOMER</text>

  <!-- Center: Logo -->
  <text x="600" y="248" font-family="'Arial Black', Arial, sans-serif" font-size="118" font-weight="900" text-anchor="middle" letter-spacing="-5">
    <tspan fill="white">CELL</tspan><tspan fill="#2dd4bf">TECH</tspan>
  </text>

  <!-- POS badge -->
  <rect x="532" y="270" width="136" height="44" rx="10" fill="rgba(45,212,191,0.1)" stroke="rgba(45,212,191,0.35)" stroke-width="1.5"/>
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#38bdf8" text-anchor="middle" letter-spacing="10">POS</text>

  <!-- Tagline -->
  <text x="600" y="368" font-family="Arial, sans-serif" font-size="28" font-weight="400" fill="#94a3b8" text-anchor="middle" letter-spacing="0.3">Repair &amp; Wireless Retail Management</text>

  <!-- Feature pills row -->
  <g transform="translate(600, 430)">
    <rect x="-350" y="0" width="126" height="36" rx="18" fill="rgba(45,212,191,0.08)" stroke="rgba(45,212,191,0.2)" stroke-width="1"/>
    <text x="-287" y="23" font-family="Arial" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle">📱 Point of Sale</text>

    <rect x="-204" y="0" width="106" height="36" rx="18" fill="rgba(45,212,191,0.08)" stroke="rgba(45,212,191,0.2)" stroke-width="1"/>
    <text x="-151" y="23" font-family="Arial" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle">🔧 Repairs</text>

    <rect x="-78" y="0" width="116" height="36" rx="18" fill="rgba(45,212,191,0.08)" stroke="rgba(45,212,191,0.2)" stroke-width="1"/>
    <text x="-20" y="23" font-family="Arial" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle">📦 Inventory</text>

    <rect x="58" y="0" width="124" height="36" rx="18" fill="rgba(45,212,191,0.08)" stroke="rgba(45,212,191,0.2)" stroke-width="1"/>
    <text x="120" y="23" font-family="Arial" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle">📶 Activations</text>

    <rect x="202" y="0" width="92" height="36" rx="18" fill="rgba(45,212,191,0.08)" stroke="rgba(45,212,191,0.2)" stroke-width="1"/>
    <text x="248" y="23" font-family="Arial" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle">👥 CRM</text>
  </g>

  <!-- Bottom URL bar -->
  <rect x="450" y="540" width="300" height="40" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <circle cx="474" cy="560" r="5" fill="#0d9488"/>
  <text x="600" y="565" font-family="Arial, sans-serif" font-size="15" font-weight="500" fill="#64748b" text-anchor="middle" letter-spacing="0.5">celltechpos.com</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#green)" opacity="0.4"/>
</svg>
